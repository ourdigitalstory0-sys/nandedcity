name: Production Audit & Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Lint Codebase
      run: npm run lint
      continue-on-error: true

    - name: Production Type Check & Build
      run: npm run build

    - name: Security Audit
      run: npm audit --audit-level=high
      continue-on-error: true

    - name: Lighthouse Performance Audit
      uses: treosh/lighthouse-ci-action@v11
      with:
        urls: |
          http://localhost:3000/
          http://localhost:3000/projects
        buildNpmScript: "build"
        serverNpmScript: "start"
        budgetPath: ".github/lighthouse-budget.json"
      continue-on-error: true
